name: 📥 YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '🔗 لینک ویدیو یوتیوب'
        required: true
        type: string
      quality:
        description: '🎬 کیفیت ویدیو'
        required: true
        type: choice
        options:
          - '360p'
          - '480p'
          - '720p'
          - '1080p'
          - 'best'
        default: '720p'
      download_subtitle:
        description: '📝 دانلود زیرنویس؟'
        required: false
        type: boolean
        default: false

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg
          pip3 install -U yt-dlp

      - name: 📥 Download video
        run: |
          mkdir -p videos
          
          # تنظیم کیفیت
          if [ "${{ inputs.quality }}" = "best" ]; then
            FORMAT="bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best"
          else
            HEIGHT="${{ inputs.quality }}"
            HEIGHT="${HEIGHT%p}"
            FORMAT="bestvideo[height<=${HEIGHT}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${HEIGHT}][ext=mp4]/best"
          fi
          
          # تنظیم زیرنویس
          SUBTITLE_FLAG=""
          if [ "${{ inputs.download_subtitle }}" = "true" ]; then
            SUBTITLE_FLAG="--write-auto-sub --sub-lang fa,en --embed-subs"
          fi
          
          # دانلود با fallback و تنظیمات پیشرفته
          yt-dlp \
            --no-cache-dir \
            --no-part \
            --retries 10 \
            --fragment-retries 10 \
            --concurrent-fragments 8 \
            --buffer-size 16K \
            --http-chunk-size 10M \
            --no-check-certificates \
            --extractor-args "youtube:player_client=web,ios" \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -f "$FORMAT" \
            $SUBTITLE_FLAG \
            -o "videos/%(title)s.%(ext)s" \
            "${{ inputs.video_url }}" || \
          yt-dlp \
            --no-cache-dir \
            --extractor-args "youtube:player_client=android" \
            -f "$FORMAT" \
            $SUBTITLE_FLAG \
            -o "videos/%(title)s.%(ext)s" \
            "${{ inputs.video_url }}"

      - name: 📊 Check file size and split if needed
        run: |
          cd videos
          for file in *; do
            if [ -f "$file" ]; then
              SIZE=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file")
              SIZE_MB=$((SIZE / 1024 / 1024))
              
              if [ $SIZE_MB -gt 90 ]; then
                echo "📦 Splitting $file (${SIZE_MB}MB)..."
                zip -s 45m "${file}.zip" "$file"
                rm "$file"
              fi
            fi
          done

      - name: 📝 Create download info
        run: |
          cd videos
          echo "# 📥 Downloaded Video" > README.md
          echo "" >> README.md
          echo "**URL:** ${{ inputs.video_url }}" >> README.md
          echo "**Quality:** ${{ inputs.quality }}" >> README.md
          echo "**Date:** $(date)" >> README.md
          echo "" >> README.md
          echo "## 📁 Files:" >> README.md
          ls -lh >> README.md

      - name: 🚀 Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add videos/
          git commit -m "📥 Downloaded: ${{ inputs.video_url }}" || echo "No changes"
          git push
