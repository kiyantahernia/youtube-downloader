name: 📥 YouTube Video Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: '🔗 لینک ویدیو یوتیوب'
        required: true
        type: string
      quality:
        description: '🎬 کیفیت ویدیو'
        required: true
        type: choice
        options:
          - '360p'
          - '480p'
          - '720p'
          - '1080p'
        default: '720p'
      download_subtitle:
        description: '📝 دانلود زیرنویس؟'
        required: false
        type: boolean
        default: false

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v3

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg
          pip3 install -U yt-dlp

      - name: 📁 Create videos directory
        run: mkdir -p videos

      - name: 🍪 Setup cookies
        env:
          COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$COOKIES" ]; then
            echo "$COOKIES" > cookies.txt
          else
            # اگر cookies نداریم، یک فایل خالی بسازیم
            touch cookies.txt
          fi

      - name: 📥 Download video
        run: |
          cd videos
          QUALITY="${{ github.event.inputs.quality }}"
          URL="${{ github.event.inputs.video_url }}"
          SUBTITLE="${{ github.event.inputs.download_subtitle }}"
          
          case $QUALITY in
            "360p") FORMAT="bestvideo[height<=360]+bestaudio/best[height<=360]" ;;
            "480p") FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
            "720p") FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
            "1080p") FORMAT="bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
            *) FORMAT="best" ;;
          esac
          
          # دانلود با تنظیمات بهتر برای دور زدن bot detection
          OPTS="--no-check-certificates --user-agent 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'"
          
          if [ -s ../cookies.txt ]; then
            OPTS="$OPTS --cookies ../cookies.txt"
          fi
          
          if [ "$SUBTITLE" = "true" ]; then
            yt-dlp $OPTS -f "$FORMAT" --merge-output-format mp4 --write-auto-sub --sub-lang fa,en -o "%(title)s.%(ext)s" "$URL"
          else
            yt-dlp $OPTS -f "$FORMAT" --merge-output-format mp4 -o "%(title)s.%(ext)s" "$URL"
          fi

      - name: 📝 Create README
        run: |
          cat > videos/README.md << 'EOF'
          # 📥 Downloaded Videos
          
          ## ℹ️ Download Info
          - **URL:** ${{ github.event.inputs.video_url }}
          - **Quality:** ${{ github.event.inputs.quality }}
          - **Subtitle:** ${{ github.event.inputs.download_subtitle }}
          - **Date:** $(date)
          
          ## 📦 Files
          EOF
          ls -lh videos/ >> videos/README.md

      - name: ✂️ Split large files
        run: |
          cd videos
          for file in *.mp4; do
            if [ -f "$file" ]; then
              SIZE=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file")
              if [ $SIZE -gt 94371840 ]; then
                echo "Splitting $file..."
                zip -s 45m "${file}.zip" "$file"
                rm "$file"
              fi
            fi
          done

      - name: 🚀 Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add videos/
          git commit -m "📥 Downloaded: ${{ github.event.inputs.quality }} - $(date)"
          git push
